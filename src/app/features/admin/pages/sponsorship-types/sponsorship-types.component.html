<div class="page-header"><h2>Sponsorship Types</h2></div>

<mat-card class="add-card">
  <mat-card-content>
    <form [formGroup]="form" (ngSubmit)="add()" class="add-form">
      <mat-form-field appearance="outline" class="grow">
        <mat-label>New sponsorship type name</mat-label>
        <input matInput formControlName="name" maxlength="100" />
      </mat-form-field>
      <button mat-flat-button color="primary" type="submit"
              [disabled]="form.invalid || saving()">
        <mat-icon>add</mat-icon> Add
      </button>
    </form>
  </mat-card-content>
</mat-card>

@if (loading()) {
  <div class="centered"><mat-spinner diameter="36"></mat-spinner></div>
} @else {
  <div class="table-wrap">
    <table mat-table [dataSource]="items()" class="mat-elevation-z1">
      <ng-container matColumnDef="name">
        <th mat-header-cell *matHeaderCellDef>Name</th>
        <td mat-cell *matCellDef="let t">{{ t.name }}</td>
      </ng-container>
      <ng-container matColumnDef="status">
        <th mat-header-cell *matHeaderCellDef>Active</th>
        <td mat-cell *matCellDef="let t">
          <mat-slide-toggle [checked]="t.isActive" (change)="toggle(t)"></mat-slide-toggle>
        </td>
      </ng-container>
      <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef></th>
        <td mat-cell *matCellDef="let t"></td>
      </ng-container>
      <tr mat-header-row *matHeaderRowDef="columns"></tr>
      <tr mat-row *matRowDef="let row; columns: columns"></tr>
    </table>
  </div>
}
